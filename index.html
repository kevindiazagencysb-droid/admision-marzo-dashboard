<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admision Marzo 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 24px 32px; border-bottom: 1px solid #334155; }
.header h1 { font-size: 1.8rem; font-weight: 700; color: #f8fafc; }
.header p { color: #94a3b8; margin-top: 4px; font-size: 0.9rem; }
.refresh-bar { background: #1e293b; padding: 8px 32px; font-size: 0.8rem; color: #64748b; display: flex; justify-content: space-between; align-items: center; }
.refresh-bar a { color: #38bdf8; text-decoration: none; cursor: pointer; }
.refresh-bar a:hover { text-decoration: underline; }
.container { padding: 24px 32px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
.kpi-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; text-align: center; }
.kpi-card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.kpi-card .value { font-size: 2rem; font-weight: 700; color: #f8fafc; }
.kpi-card .value.green { color: #4ade80; }
.kpi-card .value.blue { color: #38bdf8; }
.kpi-card .value.yellow { color: #fbbf24; }
.date-section { margin-bottom: 28px; }
.date-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1e293b; border-radius: 10px 10px 0 0; border: 1px solid #334155; border-bottom: none; }
.date-header h2 { font-size: 1rem; font-weight: 600; color: #f1f5f9; text-transform: capitalize; }
.hoy-badge { background: #22c55e; color: white; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
.date-count { margin-left: auto; font-size: 0.75rem; color: #64748b; }
.sessions-table { width: 100%; border-collapse: collapse; background: #1e293b; border: 1px solid #334155; border-radius: 0 0 10px 10px; overflow: hidden; }
.sessions-table th { background: #0f172a; padding: 10px 14px; text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; font-weight: 600; }
.sessions-table td { padding: 12px 14px; font-size: 0.875rem; border-top: 1px solid #1e293b; }
.sessions-table tr:hover td { background: #0f172a; }
.sessions-table tr td { background: #1e293b; }
.monto.paid { color: #4ade80; font-weight: 700; }
.monto.zero { color: #f87171; }
.monto.empty { color: #475569; font-style: italic; }
.loading { text-align: center; padding: 60px; color: #64748b; font-size: 1rem; }
.error { text-align: center; padding: 60px; color: #f87171; font-size: 1rem; }
</style>
</head>
<body>
<div class="header">
  <h1>🎯 Dashboard Admision Marzo 2026</h1>
  <p>Seguimiento de sesiones y pagos de 1ra llamada</p>
</div>
<div class="refresh-bar">
  <span id="last-update">Cargando...</span>
  <a onclick="loadSessions()">↻ Refrescar</a>
</div>
<div class="container">
  <div class="kpi-grid">
    <div class="kpi-card"><div class="label">Total Agendas</div><div class="value blue" id="kpi-total">—</div></div>
    <div class="kpi-card"><div class="label">Pagaron</div><div class="value green" id="kpi-paid">—</div></div>
    <div class="kpi-card"><div class="label">Cash 1ra Llamada</div><div class="value green" id="kpi-cash">—</div></div>
    <div class="kpi-card"><div class="label">Tasa de Cierre</div><div class="value yellow" id="kpi-rate">—</div></div>
  </div>
  <div id="admision-sessions-container"><div class="loading">⏳ Cargando sesiones desde Google Sheets...</div></div>
</div>
<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1oBuUI3m6z_mRxKnzDuzZseqMZ9kOp4_vm_DMS7ghzpo/gviz/tq?tqx=out:csv&sheet=Marzo';

function parseMonto(val) {
  if (!val || val.trim() === '' || val.trim() === '?') return null;
  const n = parseFloat(val.replace(/[^0-9.-]/g, '').replace(',', '.'));
  return isNaN(n) ? null : n;
}

function formatMoney(n) {
  if (n === null) return '—';
  return '$' + n.toLocaleString('es-AR', {minimumFractionDigits: 0});
}

function getDayLabel(dateStr) {
  if (!dateStr) return dateStr;
  const parts = dateStr.split('/');
  if (parts.length !== 3) return dateStr;
  const d = new Date(parseInt(parts[2]), parseInt(parts[0])-1, parseInt(parts[1]));
  const days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}

function isToday(dateStr) {
  if (!dateStr) return false;
  const parts = dateStr.split('/');
  if (parts.length !== 3) return false;
  const now = new Date();
  return parseInt(parts[0])-1 === now.getMonth() && parseInt(parts[1]) === now.getDate() && parseInt(parts[2]) === now.getFullYear();
}

async function loadSessions() {
  const container = document.getElementById('admision-sessions-container');
  try {
    const resp = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await resp.text();
    const rows = text.trim().split('\n').map(r => {
      const cols = []; let cur = ''; let inQ = false;
      for (let i = 0; i < r.length; i++) {
        if (r[i] === '"') { inQ = !inQ; }
        else if (r[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += r[i]; }
      }
      cols.push(cur.trim()); return cols;
    });
    
    // Find header row
    let headerIdx = -1;
    let colNombre = -1, colFecha = -1, colMonto = -1;
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i];
      for (let j = 0; j < r.length; j++) {
        const v = r[j].toLowerCase();
        if (v.includes('nombre') || v.includes('cliente')) colNombre = j;
        if (v.includes('fecha') && v.includes('llamada')) colFecha = j;
        if (v.includes('monto') && v.includes('pago')) colMonto = j;
      }
      if (colFecha >= 0 && colMonto >= 0) { headerIdx = i; break; }
    }
    
    if (headerIdx < 0) {
      container.innerHTML = '<div class="error">No se encontraron columnas requeridas en el sheet.</div>';
      return;
    }
    
    // Parse data rows
    const sessions = [];
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const r = rows[i];
      const fecha = r[colFecha] ? r[colFecha].trim() : '';
      const monto = colMonto >= 0 ? (r[colMonto] ? r[colMonto].trim() : '') : '';
      const nombre = colNombre >= 0 ? (r[colNombre] ? r[colNombre].trim() : '') : '';
      if (!fecha) continue;
      sessions.push({ nombre, fecha, monto, montoNum: parseMonto(monto), row: i });
    }
    
    // Group by date
    const groups = {};
    const dateOrder = [];
    for (const s of sessions) {
      if (!groups[s.fecha]) { groups[s.fecha] = []; dateOrder.push(s.fecha); }
      groups[s.fecha].push(s);
    }
    
    // KPIs
    const totalSessions = sessions.length;
    const paidSessions = sessions.filter(s => s.montoNum !== null && s.montoNum > 0);
    const totalCash = paidSessions.reduce((sum, s) => sum + s.montoNum, 0);
    const closeRate = totalSessions > 0 ? Math.round((paidSessions.length / totalSessions) * 100) : 0;
    
    document.getElementById('kpi-total').textContent = totalSessions;
    document.getElementById('kpi-paid').textContent = paidSessions.length;
    document.getElementById('kpi-cash').textContent = formatMoney(totalCash);
    document.getElementById('kpi-rate').textContent = closeRate + '%';
    
    // Render sections
    let html = '';
    for (const fecha of dateOrder) {
      const list = groups[fecha];
      const label = getDayLabel(fecha);
      const today = isToday(fecha);
      const paidCount = list.filter(s => s.montoNum !== null && s.montoNum > 0).length;
      const fechaCash = list.filter(s => s.montoNum !== null && s.montoNum > 0).reduce((sum, s) => sum + s.montoNum, 0);
      
      html += '<div class="date-section">';
      html += '<div class="date-header">';
      html += '<h2>' + label + '</h2>';
      if (today) html += '<span class="hoy-badge">HOY</span>';
      html += '<span class="date-count">' + paidCount + '/' + list.length + ' pagaron · ' + formatMoney(fechaCash) + '</span>';
      html += '</div>';
      html += '<table class="sessions-table"><thead><tr><th>#</th><th>Nombre</th><th>Monto Pago 1ra Llamada</th></tr></thead><tbody>';
      
      list.forEach((s, idx) => {
        let montoClass = 'empty', montoDisplay = '—';
        if (s.montoNum !== null && s.montoNum > 0) { montoClass = 'paid'; montoDisplay = formatMoney(s.montoNum); }
        else if (s.monto === '$0,00' || s.monto === '$0.00' || s.monto === '0') { montoClass = 'zero'; montoDisplay = '$0'; }
        else if (s.monto) { montoClass = 'zero'; montoDisplay = s.monto; }
        
        html += '<tr><td style="color:#475569">' + (idx+1) + '</td>';
        html += '<td>' + (s.nombre || '<span style="color:#475569">Sin nombre</span>') + '</td>';
        html += '<td class="monto ' + montoClass + '">' + montoDisplay + '</td></tr>';
      });
      
      html += '</tbody></table></div>';
    }
    
    if (html === '') {
      container.innerHTML = '<div class="loading">No hay sesiones registradas aún.</div>';
    } else {
      container.innerHTML = html;
    }
    
    const now = new Date();
    document.getElementById('last-update').textContent = 'Última actualización: ' + now.toLocaleTimeString('es-AR') + ' · Auto-refresca cada 60s';
    
  } catch (err) {
    container.innerHTML = '<div class="error">Error cargando datos: ' + err.message + '</div>';
    document.getElementById('last-update').textContent = 'Error al cargar';
  }
}

loadSessions();
setInterval(loadSessions, 60000);
</script>
</body>
</html>
