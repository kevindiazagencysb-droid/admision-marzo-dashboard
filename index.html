<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admision Marzo 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:20px 32px;border-bottom:2px solid #334155}
.header h1{font-size:1.6rem;font-weight:700;color:#f8fafc}
.header p{color:#94a3b8;margin-top:4px;font-size:.85rem}
.rbar{background:#1e293b;padding:7px 32px;font-size:.78rem;color:#64748b;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155}
.rbar a{color:#38bdf8;text-decoration:none;cursor:pointer;font-weight:600}
.tabs{display:flex;gap:0;background:#1e293b;border-bottom:2px solid #334155;padding:0 32px}
.tab{padding:12px 20px;cursor:pointer;font-size:.85rem;font-weight:600;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:#e2e8f0}
.tab.active{color:#38bdf8;border-bottom-color:#38bdf8}
.panel{display:none;padding:24px 32px}
.panel.active{display:block}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.kcard{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:18px 16px;text-align:center}
.kcard .lbl{font-size:.7rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kcard .val{font-size:1.8rem;font-weight:700;color:#f8fafc}
.kcard .val.g{color:#4ade80}
.kcard .val.b{color:#38bdf8}
.kcard .val.y{color:#fbbf24}
.kcard .val.r{color:#f87171}
.kcard .val.p{color:#c084fc}
.kcard .sub{font-size:.7rem;color:#64748b;margin-top:4px}
.dsec{margin-bottom:24px}
.dhdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#1e293b;border-radius:8px 8px 0 0;border:1px solid #334155;border-bottom:none}
.dhdr h2{font-size:.9rem;font-weight:700;color:#f1f5f9;text-transform:capitalize}
.hoy{background:#22c55e;color:white;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.dcnt{margin-left:auto;font-size:.72rem;color:#64748b;text-align:right}
.tbl{width:100%;border-collapse:collapse;background:#1e293b;border:1px solid #334155;border-radius:0 0 8px 8px;overflow:hidden;font-size:.82rem}
.tbl th{background:#0f172a;padding:9px 12px;text-align:left;font-size:.65rem;text-transform:uppercase;color:#64748b;font-weight:600;letter-spacing:.04em}
.tbl td{padding:10px 12px;border-top:1px solid #0f172a;background:#1e293b}
.tbl tr:hover td{background:#162032}
.paid{color:#4ade80;font-weight:700}
.zero{color:#f87171}
.pend{color:#fbbf24}
.emp{color:#475569;font-style:italic}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-fp{background:#166534;color:#4ade80}
.badge-cu{background:#1e3a5f;color:#60a5fa}
.badge-pend{background:#3d2c00;color:#fbbf24}
.badge-comp{background:#0f3d2a;color:#4d399}
.badge-sa{background:#2d1b4e;color:#c084fc}
.badge-reimb{background:#3d0f0f;color:#f87171}
.badge-canal{background:#1e3a5f;color:#60a5fa}
.prog-bar{width:100%;background:#334155;border-radius:4px;height:8px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#22c55e,#4ade80)}
.stitle{font-size:.8rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #334155}
.msg{text-align:center;padding:50px;color:#64748b}
.err{text-align:center;padding:50px;color:#f87171}
</style>
</head>
<body>
<div class="header">
  <h1>&#127919; Dashboard Admision Marzo 2026</h1>
  <p>Seguimiento de sesiones - pagos de 1ra llamada - admision al programa</p>
</div>
<div class="rbar">
  <span id="lu">Cargando...</span>
  <a onclick="run()">&#8635; Refrescar</a>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('t1',this)">&#128197; Por Fecha</div>
  <div class="tab" onclick="showTab('t2',this)">&#128075; Admision (Pagos)</div>
  <div class="tab" onclick="showTab('t3',this)">&#9989; Resumen</div>
</div>
<div id="t1" class="panel active"><div class="msg">Cargando...</div></div>
<div id="t2" class="panel"><div class="msg">Cargando...</div></div>
<div id="t3" class="panel"><div class="msg">Cargando...</div></div>
<script src="dashboard.js"></script>
</body>
</html>
